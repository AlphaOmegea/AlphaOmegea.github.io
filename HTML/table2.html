<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table 2</title>
</head>
<body>
    <h1>Voucher</h1>
    <table border="1" cellspacing="0" cellpadding="15">
        <thead>
            <tr>
                <th>No.</th>
                <th>Item Name</th>
                <th>Price</th>
                <th>Qty</th>
                <th>SubTotal</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Clothes</td>
                <td>19,999</td>
                <td>2</td>
                <td>39,998</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Shampoo</td>
                <td>10,000</td>
                <td>1</td>
                <td>10,000</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Hair Dryer</td>
                <td>35,000</td>
                <td>1</td>
                <td>35,000</td>
            </tr>
            <tr>
                <td colspan="4" align="center">Total</td>
                <td>84,998</td>
            </tr>
        </tbody>
        
    </table>

    <h1>Save Money</h1>
    <table border="1" cellspacing="0" cellpadding="15">
        <thead>
            <tr>
                <th>Months</th>
                <th>Save Money</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>January</td>
                <td>50,000</td>
                <td rowspan="5">350,000</td>
            </tr>
            <tr>
                <td>February</td>
                <td>60,000</td>
            </tr>
            <tr>
                <td>March</td>
                <td>70,000</td>
            </tr>
            <tr>
                <td>April</td>
                <td>80,000</td>
            </tr>
            <tr>
                <td>May</td>
                <td>90,000</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
