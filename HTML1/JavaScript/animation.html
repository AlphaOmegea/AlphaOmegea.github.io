<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Animation</title>
    <style>
        #img2{
            height: 214px;
            background-image: url('img2.jpg');
            background-repeat: repeat;
            background-position: center;
        }
        #img4{
            position: relative;
            margin-top: -125px;
        }
    </style>
</head>
<body>
    <div id="img2"></div>
    <img src="img4.jpg" alt="" width="300" height="131" id="img4" >
    <br><br><br>
    <button type="button" onclick="startTrain">Start</button>

    <script>
        function startTrain(){
            let train = document.querySelector('#img4');
            let start = Date.now();
            console.log(start);

            let timer = setInterval(function(){
                let timePassed = Date.now() - start;
                console.log('This is Date Now' + Date.now())
                console.log('This is time passed' + timePassed);
                
                train.style.left = timePassed/5 + 'px';
                console.log(timePassed/5);
                if(timePassed > 5000)clearInterval(timer);
            
        },20)
    }
    </script>
</body>
</html>
