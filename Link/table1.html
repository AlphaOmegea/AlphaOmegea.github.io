<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice</title>
</head>
<body>
    <h1>Invoices</h1>
    <table border="1" cellspacing="0" cellpadding="30" >
       <thead>
            <tr>
                <th>No.</th>
                <th>Item Name</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Amount</th>
            </tr>
       </thead>
       <tbody>
            <tr>
                <td>1</td>
                <td>Pencil</td>
                <td>5,000</td>
                <td>2</td>
                <td>10,000</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Earaser</td>
                <td>2,500</td>
                <td>2</td>
                <td>5,000</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Book</td>
                <td>2,000</td>
                <td>3</td>
                <td>6,000</td>
            </tr>
       </tbody>
       <tfoot>
            <tr>
                 <td colspan="4" align="center">Total</td>
                 <td>21,000</td>
             </tr>
       </tfoot>

    </table>

    <h1>Save Money</h1>
    <table border="1" cellspacing="0" cellpadding="15">
        <thead>
            <tr>
                <th>Months</th>
                <th>Save money</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>January</td>
                <td>100,000</td>
                <td rowspan="4">400,000</td>
            </tr>
            <tr>
                <td>February</td>
                <td>50,000</td>
            </tr>
            <tr>
                <td>March</td>
                <td>50,000</td>
            </tr>
            <tr>
                <td>April</td>
                <td>200,000</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
